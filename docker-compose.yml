name: sentrilog

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentrilog
      POSTGRES_PASSWORD: sentrilog
      POSTGRES_DB: sentrilog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentrilog -d sentrilog"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sentrilog
      MINIO_ROOT_PASSWORD: sentrilog123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 sentrilog sentrilog123 &&
      (mc mb -p local/sentrilog-documents || true) &&
      mc version enable local/sentrilog-documents
      "
    restart: "no"

  temporal:
    image: temporalio/auto-setup:1.24.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: sentrilog
      POSTGRES_PWD: sentrilog
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    healthcheck:
      # auto-setup binds the frontend port to the container's own hostname/IP, not loopback --
      # "localhost" here would always fail. Use tctl against $(hostname) instead of a raw TCP probe
      # so the check verifies the gRPC service is actually serving, not just that a port is open.
      test: ["CMD-SHELL", "tctl --address \"$$(hostname):7233\" cluster health | grep -q SERVING"]
      interval: 5s
      timeout: 5s
      retries: 30

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
